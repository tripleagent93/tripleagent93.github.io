<!DOCTYPE html>
<html>
  <head>
    <title>portfolio</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <link href="//normalize-css.googlecode.com/svn/trunk/normalize.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Lato:100,300,400" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet" type="text/css">

  </head>
  <body>

      <header class="container">
        <div class="row">
           <div class="col-sm-3 logo">
             <img class="title-logo"  src="img/udacity-logo.svg" alt="udacity-logo">
          </div>

          <div id="super-text" class="col-sm-9 text-right text-uppercase">
            <h1 class="title-super text-thin">JANE DOETTE</h1>
            <h4>Front-end Ninja</h4>
          </div>
        </div>
        <hr>
      </header>


      <section class="container" id="hero-section">
        <div class="row">
          <div class="col-md-12">
            <picture>
              <source media="(min-width: 1000px)" srcset="img/css3-code.jpg">
              <source media="(min-width: 500px)" srcset="img/css3-code-1024_large.jpg">
              <img class="img-responsive" src="img/css3-code-480_small.jpg" alt="hero image">
            </picture>
          </div>
        </div>
      </section>



      <main class="container" id="feature-section">
        <div class="row">
          <div class="col-md-12">
            <h2 class="text-muted">Featured Work</h2>
          </div>
        </div>
        <div class="row">
          <article>
            <div class="col-md-4 text-center">
              <img class="img-responsive feature-img center" src="img/app-store.jpg" alt="appify-img">
              <h3 class="text-uppercase ">Appify</h3>
              <p>
                <a href="https://github.com/udacity/appify" target="_blank">https://github.com/udacity/appify</a>
              </p>
            </div>
          </article>
          <article>
            <div class="col-md-4 text-center">
              <img class="img-responsive feature-img center" src="img/sunflower.jpg" alt="sunflower-img">
              <h3 class="text-uppercase">Sunflower</h3>
              <p>
                <a href="https://github.com/udacity/sunflower" target="_blank">https://github.com/udacity/sunflower</a>
              </p>
            </div>
          </article>
          <article>
            <div class="col-md-4 text-center">
              <img class="img-responsive feature-img center" src="img/app.png" alt="bokeh-img">
              <h3 class="text-uppercase">Bokeh</h3>
              <p>
                <a href="https://github.com/udacity/bokeh" target="_blank">https://github.com/udacity/bokeh</a>
              </p>
            </div>
          </article>
        </div>
      </main>


  </body>

</html>
